<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SalDesk — Gestao Turistica</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0D5470" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
 <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
    <style>
    #pwa-banner{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;background:#062A38;color:#fff;border-radius:16px;padding:14px 20px;box-shadow:0 8px 32px rgba(6,42,56,.35);align-items:center;gap:14px;max-width:360px;width:calc(100% - 32px);font-family:'DM Sans',sans-serif;animation:slideUp .3s ease}
    @keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    #pwa-banner img{width:40px;height:40px;border-radius:10px;flex-shrink:0}
    #pwa-banner-text{flex:1}
    #pwa-banner-text strong{display:block;font-size:.9rem;font-weight:700}
    #pwa-banner-text span{font-size:.75rem;color:rgba(255,255,255,.65)}
    #pwa-install-btn{background:#D4A82A;color:#fff;border:none;border-radius:50px;padding:8px 18px;font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
    #pwa-dismiss-btn{background:none;border:none;color:rgba(255,255,255,.5);font-size:1.2rem;cursor:pointer;padding:0 4px;line-height:1}
  </style>
  <script>
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt',function(e){
      e.preventDefault();deferredPrompt=e;
      if(localStorage.getItem('pwa-dismissed'))return;
      setTimeout(function(){var b=document.getElementById('pwa-banner');if(b)b.style.display='flex';},2000);
    });
    function installPwa(){var b=document.getElementById('pwa-banner');if(b)b.style.display='none';if(!deferredPrompt)return;deferredPrompt.prompt();deferredPrompt.userChoice.then(function(){deferredPrompt=null;});}
    function dismissPwa(){var b=document.getElementById('pwa-banner');if(b)b.style.display='none';localStorage.setItem('pwa-dismissed','1');}
    window.addEventListener('appinstalled',function(){var b=document.getElementById('pwa-banner');if(b)b.style.display='none';});
  </script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <div id="pwa-banner">
    <img src="/icon-192.png" alt="SalDesk" />
    <div id="pwa-banner-text">
      <strong>Instalar SalDesk</strong>
      <span>Acesso rapido no seu telemovel</span>
    </div>
    <button id="pwa-install-btn" onclick="installPwa()">Instalar</button>
    <button id="pwa-dismiss-btn" onclick="dismissPwa()">&#x2715;</button>
  </div>
</body>
</html>
