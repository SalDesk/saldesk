# =============================================================
# SalDesk — Configuracao Nginx
# 3 dominios: saldesk.cv | app.saldesk.cv | api.saldesk.cv
# Apos Let's Encrypt, o Certbot adiciona os blocos SSL automaticamente
# =============================================================

# Redireccionar HTTP -> HTTPS (saldesk.cv)
server {
    listen 80;
    server_name saldesk.cv www.saldesk.cv;
    return 301 https://$host$request_uri;
}

# Website institucional — saldesk.cv
server {
    listen 443 ssl http2;
    server_name saldesk.cv www.saldesk.cv;

    root /var/www/saldesk/website;
    index index.html;

    # Ficheiros estaticos com cache longa
    location ~* \.(css|js|woff2|woff|ttf|ico|png|jpg|jpeg|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Seguranca
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gerido pelo Certbot:
    # ssl_certificate ...
    # ssl_certificate_key ...
}

# Redireccionar HTTP -> HTTPS (app.saldesk.cv)
server {
    listen 80;
    server_name app.saldesk.cv;
    return 301 https://$host$request_uri;
}

# Dashboard do operador — app.saldesk.cv
server {
    listen 443 ssl http2;
    server_name app.saldesk.cv;

    root /var/www/saldesk/frontend/dist;
    index index.html;

    # Assets do Vite com hash no nome — cache muito longa
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA — todas as rotas apontam para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Gerido pelo Certbot:
    # ssl_certificate ...
    # ssl_certificate_key ...
}

# Redireccionar HTTP -> HTTPS (api.saldesk.cv)
server {
    listen 80;
    server_name api.saldesk.cv;
    return 301 https://$host$request_uri;
}

# API REST — api.saldesk.cv
server {
    listen 443 ssl http2;
    server_name api.saldesk.cv;

    # Limite de tamanho dos pedidos (uploads de imagens)
    client_max_body_size 10M;

    location / {
        proxy_pass         http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # Health check sem logs
    location = /api/health {
        proxy_pass http://localhost:3001;
        access_log off;
    }

    add_header X-Content-Type-Options "nosniff" always;

    # Gerido pelo Certbot:
    # ssl_certificate ...
    # ssl_certificate_key ...
}
